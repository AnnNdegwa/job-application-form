<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Survey Form</title>
    </head>
    <body>
        <form method="post">
            <label for="name">Name</label>
            <input type="text" id ="name" name="username" placeholder="Enter your name">
            <br><br>
            <label for="email">Email</label>
            <input type="email" id="email" name="useremail">
            <label for="number">Number</label>
            <input type="number" id="number" name="usernumber" placeholder="12345678">
            <br><br>
            <p>Choose your favorite feature</p>
            <input type="radio" id="chat" name="feature" value="chat">
            <label for="chat">Chat</label>
            <input type="radio" id="task" name="feature" value="task">
            <label for="task">Task</label>
            <br><br>
            <p>What should we improve?</p>
            <input type="checkbox" id="price" name="improve" value="price">
            <label for="price">Price</label>
            <input type="checkbox" id="speed" name="improve" value="speed">
            <label for="speed">Waiting time</label>
            <br><br>
            
            <label for="experince">How often do you use the app?</label>
            <select id="experience" name="usage">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
            </select>
            <br><br>
            <textarea name="comment" placeholder="Write feedback"></textarea>
            <br><br>
            <button type="submit">Submit</button>

        </form>
        <br><br>
        <h2>Favorite Food and Drink Survey</h2>
        <form id="Survey">
            <fieldset>
                <legend>Pick your favorite drink:</legend>
                <input type="radio" id="water" name="drink" value="water">
                <label for ="water">Water</label>
                <input type="radio" id="soda" name="drink" value="soda">
                <label for="soda">Soda</label>
            </fieldset>
            <br><br>
            <fieldset>
                <legend>Pick your favorite foods</legend>
                <input type="checkbox" id="rice" name="food" value="rice">
                <label for="rice">Rice</label>
                <input type="checkbox" id="pizza" name="food" value="pizza">
                <label for="pizza">Pizza</label>
            </fieldset>
            <br><br>
            <button type="submit">Submit</button>
        </form>
    </body>
</html>
