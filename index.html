<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width device-width, initial-scale 1.0">
        <title>Job application form</title>
        <link rel="stylesheet" href="job-application.css">
    </head>
    <body>
        <div class="container">
            <header class="title">
            <h1>Job Application Form</h1>
            </header>
            <form>
            
                <label for="name"class="star">Full Name</label>
                <input type="text"id="name" name="username"required>
                <label for="email"class="star">Email Address</label>
                <input type="email" id="email" name="useremail"required>
                <label for="number"class="star">Phone Number</label>
                <input type="number"id="number" name="phone-number">
    
                <select class="position"required>
                    <option value=" " selected disabled>Select position</option>
                    <option value="frontend-developer">Frontend Developer</option>
                    <option value="ui/ux-designer">UI/UX Designer</option>
                    <option value="backend-developer">Backend Developer</option>
                </select>
    
                <fieldset class="employment-status"required>
                    <legend>What is your employment status?</legend>
                    <input type="radio" name="employment-status" id="employed">
                    <label for="employed">Employed</label>
                    <input type="radio" name="employment-status" id="unemployed">
                    <label for="unemployed">Unemployed</label>
                </fieldset>
                <fieldset class="availability">
                    <legend>Select your availability</legend>
                    <input type="radio" name="availability" id="full-time">
                    <label for="full-time">Full Time</label>
                    <input type="radio" name="availability" id="part-time">
                    <label for="part-time">Part Time</label>
                </fieldset>
                <p>Why should we hire you?</p>
                <textarea required cols="20" rows="6"placeholder="Write your motivation"></textarea>
                <button type="submit">Submit Application</button>
            </form>
        </div>
    </body>
</html>
