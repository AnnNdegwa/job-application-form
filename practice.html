   
        <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accesskey Example</title>
</head>
<body>
  <h1>Accesskey Demo</h1>

  <!-- Buttons with accesskey -->
  <button accesskey="s">Save (Alt + S)</button>
  <button accesskey="c">Cancel (Alt + C)</button>

  <!-- Link with accesskey -->
  <a href="index.html" accesskey="h">Home (Alt + H)</a>

  <p>Try pressing Alt + S (Windows) or Ctrl + Option + S (Mac) to activate Save.</p>
  <p>Try Alt + C (Windows) or Ctrl + Option + C (Mac) for Cancel.</p>
  <p>Try Alt + H (Windows) or Ctrl + Option + H (Mac) to go to Home.</p>
  <label for="email"><span aria-hidden="true">*</span>Email</label>
  <input type="email" id="email" name="useremail" aria-describedby="email-help">
  <p id="email-help">Enter a valid email</p>
</body>
</html>
